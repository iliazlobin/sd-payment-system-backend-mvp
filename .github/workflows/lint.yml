# ─────────────────────────────────────────────────────────────────────────────
# lint.yml — Static analysis (ruff check + ruff format)
# Runs on every push and pull request to main.
# Pins ruff to 0.8.x for consistency with the sandbox version.
# ─────────────────────────────────────────────────────────────────────────────

name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 13 * * *"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install 'ruff>=0.8,<0.9'

      - name: ruff check
        run: ruff check --output-format=github

      - name: ruff format
        run: ruff format --check
