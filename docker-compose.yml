services:
  # ── Database ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment
      POSTGRES_DB: payment
    ports:
      # Published only for local debugging. The app talks over the compose
      # network — comment this out if the host port collides with another
      # Postgres instance.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment -d payment"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  # ── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      # Published only for local debugging.
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  # ── App ───────────────────────────────────────────────────────────────
  app:
    build:
      context: .
    ports:
      - "${APP_PORT:-8030}:8000"
    environment:
      DB_DSN: "postgresql+asyncpg://payment:payment@db:5432/payment"
      REDIS_URL: "redis://redis:6379/0"
      LOG_LEVEL: "debug"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
